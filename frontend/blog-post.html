<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaflytics – Blog Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="nav">
  <a href="dashboard.html" class="nav-brand">🌿 Leaflytics</a>
  <ul class="nav-links">
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="plants.html">My Plants</a></li>
    <li><a href="blog.html" class="active">Blog</a></li>
  </ul>
</nav>

<main class="page-content page-content--narrow">

  <!-- Back link -->
  <a href="blog.html" class="back-link">← Back to Blog</a>

  <!-- Loading -->
  <div id="loadingState" class="skeleton" style="height:400px;border-radius:16px;"></div>

  <!-- Article -->
  <article class="blog-article hidden" id="article">
    <header class="article-header">
      <time class="blog-date" id="articleDate"></time>
      <h1 class="article-title" id="articleTitle"></h1>
    </header>
    <div class="article-body" id="articleBody"></div>
  </article>

  <!-- Error -->
  <div class="error-state hidden" id="errorState">
    <p>⚠️ Post not found or server is unreachable.</p>
    <a href="blog.html" class="btn btn-ghost">← Back to Blog</a>
  </div>

</main>

<footer class="footer">© 2025 Leaflytics – keep things green 🌱</footer>

<script src="api.js"></script>
<script src="utils.js"></script>
<script>
(async function init() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = 'blog.html'; return; }

  let post;
  try {
    post = await API.getBlog(id);
  } catch(e) {
    hideEl('loadingState');
    showEl('errorState');
    return;
  }

  document.title = `${post.title} – Leaflytics`;
  document.getElementById('articleDate').textContent  = formatDateTime(post.createdAt);
  document.getElementById('articleTitle').textContent = post.title;

  // Convert simple markdown-style newlines and **bold** to HTML
  const html = esc(post.content)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br />');
  document.getElementById('articleBody').innerHTML = `<p>${html}</p>`;

  hideEl('loadingState');
  showEl('article');
})();
</script>
</body>
</html>
